  <script>
  function playFaaah() {
    var audio = document.getElementById("faaahSound");
    var btn = event.target; // This gets the button you clicked
    
    audio.play();

    // Make the button change color briefly
    btn.style.backgroundColor = "#ff0000"; 
    
    // Change it back after 500 milliseconds
    setTimeout(function() {
      btn.style.backgroundColor = "#800000";
    }, 500);
  }
