<!DOCTYPE html>
<html>
<head>
  <title>Maurya's Travel Website</title>
</head>
  <p>😎 This is my first website!</p>
<audio id="faaahSound" preload="auto">
  <source src="https://www.myinstants.com/media/sounds/faaah-63455.mp3" type="audio/mpeg">
</audio>

<button onclick="playFaaah()" style="padding: 15px; cursor: pointer;">
  Press for FAAAH! 🔊
</button>

<script>
  function playFaaah() {
    var audio = document.getElementById("faaahSound");
    
    // This part helps "reset" the sound so you can click it multiple times fast
    audio.pause();
    audio.currentTime = 0;
    
    audio.play().catch(function(error) {
      console.log("Audio play failed: " + error);
      alert("Browser blocked the sound! Try clicking anywhere on the page first, then the button.");
    });
  }
</script>

</body>
</html>
